name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.16"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Format (check)
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun test
